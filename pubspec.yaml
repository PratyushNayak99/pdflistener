name: pdf_listener_app
description: "Listen to documents anytime with PDF Audio - A production-ready Flutter app"
publish_to: 'none'
version: 2.0.4+492

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # Routing
  go_router: ^14.2.0

  # State Management
  flutter_riverpod: ^2.5.1

  # Animations (Framer Motion equivalent)
  flutter_animate: ^4.5.0

  # Icons (1:1 Lucide React translation)
  lucide_icons: ^0.257.0

  # File handling
  file_picker: ^8.0.3
  just_audio: ^0.9.39

  # Preferences (persist dark mode)
  shared_preferences: ^2.2.3

  # Dashed border for upload screen
  dotted_border: ^2.1.0

  # Typography
  google_fonts: ^6.2.1

  # Cupertino-style widgets
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.1

flutter_launcher_icons:
  android: true
  image_path: "assets/icons/app_icon.png"
  adaptive_icon_foreground: "assets/icons/app_icon_foreground.png"
  adaptive_icon_background: "#1C1C1E"

flutter_native_splash:
  color: "#000000"
  color_dark: "#000000"
  android: true
  ios: false

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
