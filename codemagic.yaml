workflows:
  android-workflow:
    name: Android Workflow
    max_build_duration: 30
    environment:
      vars:
        FLUTTER_VERSION: "3.24.0"
        JAVA_VERSION: "17"
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'main'
          include: true
    scripts:
      - name: Set up Flutter
        script: |
          flutter --version
          flutter precache
          flutter pub get
      - name: Set up Android Gradle Plugin
        script: |
          cd android
          # Update Gradle wrapper if needed
          chmod +x gradlew
      - name: Build Android release
        script: |
          flutter build appbundle --release
    artifacts:
      - build/**/*.aab
      - build/**/*.apk
